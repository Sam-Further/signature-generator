<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FurtherTravel Email Signature Generator</title>
  <style>
    body { font-family: Roboto, Helvetica, Arial, sans-serif; padding:20px; background:#f9f9f9; }
    input { padding:8px; margin:5px 0; width:300px; }
    label { display:block; margin-top:10px; font-weight:bold; }
    #signature-container { margin-top:20px; }
    .btn { margin-top:10px; padding:10px 15px; background:#f05d3e; color:white; border:none; cursor:pointer; }
  </style>
</head>
<body>

  <h2>FurtherTravel Signature Generator</h2>

  <label>Full Name:</label>
  <input type="text" id="name" placeholder="Full Name">

  <label>Job Title:</label>
  <input type="text" id="role" placeholder="Job Title">

  <label>Email Address:</label>
  <input type="text" id="email" placeholder="name@furthertravel.com">

  <br>
  <button class="btn" onclick="generateSignature()">Generate Signature</button>
  <button class="btn" onclick="copySignature()">Copy Signature</button>

  <div id="signature-container"></div>

  <script>
    function generateSignature() {
      const name = document.getElementById('name').value || 'Your Name';
      const role = document.getElementById('role').value || 'Your Role';
      const email = document.getElementById('email').value || 'name@furthertravel.com';

      const signatureHTML = `
<table cellpadding="0" cellspacing="0" width="100%" style="font-family:Roboto, Helvetica, Arial, sans-serif; max-width:600px; background-color:#FFFFFF;">
  <tbody>
    <tr>
      <td style="padding:2px;">
        
        <!-- Top row -->
        <table cellpadding="0" cellspacing="0" width="100%" style="border-collapse:collapse;">
          <tr>
            <td valign="top" style="padding-right:1px; width:60%;">
              <p style="margin:0; font-size:16px; line-height:20px; font-weight:bold; color:#212121;">
                ${name}
              </p>
              <p style="margin:2px 0 5px 0; font-size:14px; line-height:20px; color:#212121;">
                ${role}
              </p>
            </td>

            <td valign="bottom" style="width:40%;" align="right">
              <a href="https://furthertravel.com" target="_blank" style="text-decoration:none;">
                <img src="https://3448448.fs1.hubspotusercontent-na1.net/hubfs/3448448/Signatures/Signature-Animation-Final.gif" width="200" style="display:block; border:0; outline:none; padding-right:8px;">
              </a>
            </td>
          </tr>
        </table>

        <!-- Divider -->
        <table cellpadding="0" cellspacing="0" width="100%" style="margin:5px 0; border-collapse:collapse;">
          <tr>
            <td style="border-top:2px solid #f05d3e; height:2px;"></td>
          </tr>
        </table>

        <!-- Bottom row -->
        <table cellpadding="0" cellspacing="0" width="100%" style="border-collapse:collapse;">
          <tr>

            <!-- Contact -->
            <td valign="top" style="width:60%; padding-right:20px;">
              <p style="margin:3px 0; font-size:10px;">
                <a href="tel:+441612223780" style="text-decoration:none; color:#333333;">
                  <img src="https://3448448.fs1.hubspotusercontent-na1.net/hubfs/3448448/Signatures/icons8-call-48.png" width="16" style="vertical-align:middle; margin-right:5px;"> 0161 222 3780
                </a>
              </p>

              <p style="margin:5px 0; font-size:10px; color:#333333;">
                <img src="https://3448448.fs1.hubspotusercontent-na1.net/hubfs/3448448/Signatures/icons8-pin-48.png" width="16" style="vertical-align:middle; margin-right:5px;">
                First Floor, Fairbairn Building, Sackville St, Manchester, M1 3NJ
              </p>
            </td>

            <!-- Social -->
            <td valign="top" style="width:40%;" align="right">
              <table cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding:0 5px;">
                    <a href="https://www.facebook.com/furthertravel/"><img src="https://3448448.fs1.hubspotusercontent-na1.net/hubfs/3448448/Signatures/icons8-facebook-50.png" width="16"></a>
                  </td>
                  <td style="padding:0 5px;">
                    <a href="https://www.instagram.com/furthertravel/"><img src="https://3448448.fs1.hubspotusercontent-na1.net/hubfs/3448448/Signatures/icons8-instagram-50.png" width="16"></a>
                  </td>
                  <td style="padding:0 5px;">
                    <a href="https://www.tiktok.com/@furthertravel"><img src="https://3448448.fs1.hubspotusercontent-na1.net/hubfs/3448448/Signatures/icons8-tiktok-50.png" width="16"></a>
                  </td>
                  <td style="padding:0 5px;">
                    <a href="https://www.youtube.com/@FurtherTravel"><img src="https://3448448.fs1.hubspotusercontent-na1.net/hubfs/3448448/Signatures/icons8-youtube-50.png" width="16"></a>
                  </td>
                  <td style="padding:0 5px;">
                    <a href="https://www.linkedin.com/company/furthertravel/posts/?feedView=all"><img src="https://3448448.fs1.hubspotusercontent-na1.net/hubfs/3448448/Signatures/icons8-linkedin-50.png" width="16"></a>
                  </td>
                </tr>
              </table>
            </td>

          </tr>
        </table>

        <!-- Footer -->
        <p style="margin:15px 0 0 0; font-size:10px; color:#f05d3e; font-weight:bold;">
          Intrax | AuPairCare | Ayusa | AmeriCamp | FurtherTravel | Gap 360
        </p>

        <p style="margin:5px 0 0 0; font-size:8px; color:#212121; line-height:12px;">
          This email, any attachments and the information contained therein are confidential and intended solely for the use of the addressee. If you are not the intended recipient, be advised that you have received this email in error and that any use, dissemination, forwarding, printing, or copying of this email is strictly prohibited, and that the email should be returned to the sender. Registered office: 2 Leman Street, London, England, E1W 9US. Company registration number: 07373495. VAT number: 186405983
        </p>

      </td>
    </tr>
  </tbody>
</table>
      `;

      document.getElementById('signature-container').innerHTML = signatureHTML;
    }

    function copySignature() {
      const container = document.getElementById('signature-container');
      const range = document.createRange();
      range.selectNode(container);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
      document.execCommand('copy');
      alert('Signature copied. Paste into Gmail signature settings.');
    }
  </script>

</body>
</html>
